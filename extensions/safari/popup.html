<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="popup.css" />
    <title>Tumblr Studio</title>
  </head>
  <body>
    <main>
      <h1>Tumblr Studio</h1>
      <p>Save this page or the last hovered image into your capture inbox.</p>
      <button id="capture">Capture page</button>
      <label>
        App URL
        <input id="baseUrl" placeholder="http://localhost:3000" />
      </label>
      <label>
        Secret
        <input id="secret" type="password" />
      </label>
    </main>
    <script src="popup.js"></script>
  </body>
</html>
